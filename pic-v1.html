<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIC V1 - Provider Intake</title>
  <script src="https://alcdn.msauth.net/browser/2.28.1/js/msal-browser.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #17213d;
      --text: #eaf0ff;
      --muted: #9fb0d7;
      --accent: #6ea8fe;
      --accent-2: #46d6b0;
      --danger: #ff6b7a;
      --border: #2c3962;
      --shadow: 0 12px 32px rgba(6, 10, 20, 0.45);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1c2850 0%, var(--bg) 48%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .hero h1 { margin: 0; font-size: clamp(1.2rem, 2.4vw, 1.8rem); }
    .hero p { margin: 8px 0 0; color: var(--muted); }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .provider-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: rgba(10, 18, 36, 0.62);
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: 160ms ease;
    }

    .provider-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .provider-card.active { border-color: var(--accent-2); box-shadow: inset 0 0 0 1px var(--accent-2); }
    .provider-title { font-weight: 700; margin-bottom: 4px; }
    .provider-desc { color: var(--muted); font-size: 0.9rem; }
    .badge {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: #b9c8ed;
      border: 1px solid #4e5f8f;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .input, .select, .btn {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(10, 18, 36, 0.88);
      color: var(--text);
      min-height: 42px;
    }

    .btn {
      width: auto;
      cursor: pointer;
      font-weight: 600;
      transition: 160ms ease;
    }

    .btn:hover { border-color: var(--accent); }
    .btn-primary { background: linear-gradient(135deg, #3d77e8, #4ea2ff); border-color: #6ea8fe; }
    .btn-danger { border-color: #a64f61; color: #ffd2d8; }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 56vh;
      overflow: auto;
      padding-right: 4px;
    }

    .row {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: rgba(11, 19, 35, 0.6);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .row.selected { border-color: var(--accent-2); }
    .row-main strong { display: block; }
    .row-main small { color: var(--muted); }

    .grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
      max-height: 56vh;
      overflow: auto;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: rgba(11, 19, 35, 0.7);
      cursor: pointer;
    }

    .card.selected { border-color: var(--accent-2); }
    .card p { margin: 4px 0; color: var(--muted); font-size: 0.85rem; }

    .split {
      border-left: 1px dashed var(--border);
      padding-left: 12px;
    }

    .crumbs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .crumb {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      cursor: pointer;
      color: #cdddff;
      background: rgba(23, 33, 61, 0.5);
    }

    .hidden { display: none !important; }

    @media (min-width: 980px) {
      .layout { grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr); }
      .split { display: block; }
    }

    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .btn { width: 100%; }
      .split { display: none; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <section class="panel hero">
      <h1>PIC V1 Intake</h1>
      <p>Choose provider → connect → browse and select → continue to curation.</p>
    </section>

    <section class="panel" id="provider-panel">
      <h2>1) Storage Provider</h2>
      <div class="provider-grid" id="provider-grid"></div>
      <div class="status" id="provider-status"></div>
    </section>

    <section class="panel" id="auth-panel">
      <h2>2) Authentication</h2>
      <div id="google-config-row" class="hidden" style="margin-bottom:10px;">
        <label for="google-client-id" style="display:block; margin-bottom:4px; color: var(--muted); font-size:0.85rem;">Google OAuth Client ID</label>
        <input id="google-client-id" class="input" placeholder="Google client id (optional: default provided)" />
      </div>
      <div style="display:flex; gap:8px; flex-wrap: wrap;">
        <button id="connect-btn" class="btn btn-primary">Connect</button>
        <button id="disconnect-btn" class="btn btn-danger">Disconnect</button>
      </div>
      <div class="status" id="auth-status"></div>
    </section>

    <section class="panel" id="browser-panel">
      <h2>3) Browse & Select</h2>
      <div class="crumbs" id="crumbs"></div>
      <div class="toolbar">
        <input id="search-input" class="input" placeholder="Search folders/items" />
        <select id="sort-select" class="select">
          <option value="name:asc">Name (A-Z)</option>
          <option value="name:desc">Name (Z-A)</option>
          <option value="modifiedAt:desc" selected>Modified (Newest)</option>
          <option value="modifiedAt:asc">Modified (Oldest)</option>
          <option value="size:desc">Size (Largest)</option>
          <option value="size:asc">Size (Smallest)</option>
        </select>
        <button id="view-toggle-btn" class="btn">Grid View</button>
        <button id="up-btn" class="btn">Up</button>
      </div>
      <div class="status" id="browser-status"></div>
      <div class="layout" style="margin-top:10px;">
        <div>
          <div id="list-view" class="list"></div>
          <div id="grid-view" class="grid-view hidden"></div>
        </div>
        <aside class="split" id="detail-view">
          <h3 style="margin-top:0;">Selection</h3>
          <div id="selection-count" class="status">0 selected</div>
          <pre id="selection-preview" style="white-space: pre-wrap; font-size: 0.82rem; color:#d8e5ff;"></pre>
          <button id="handoff-btn" class="btn btn-primary">Continue to Curation</button>
          <div id="handoff-status" class="status"></div>
        </aside>
      </div>
    </section>
  </div>

  <script type="module" src="./pic-v1-app.js"></script>
</body>
</html>
